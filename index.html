<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <title>E-Wallet Monitor</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
  <header class="app-header">
    <h1>E-Wallet Monitor</h1>
    <nav class="app-nav" aria-label="Main navigation">
      <button class="nav-btn active" data-view="dashboard">Dashboard</button>
      <button class="nav-btn" data-view="calendar">Calendar</button>
      <button class="nav-btn" data-view="settings">Settings</button>
    </nav>
  </header>

  <main class="app-main">
    <!-- Dashboard View -->
    <section id="view-dashboard" class="view active" aria-label="Dashboard">
      <div id="projection-cards"></div>
      <div id="fund-flow"></div>
    </section>

    <!-- Calendar View -->
    <section id="view-calendar" class="view" aria-label="Calendar" hidden>
      <div class="calendar-controls">
        <button id="prev-month" aria-label="Previous month">&laquo;</button>
        <span id="calendar-title"></span>
        <button id="next-month" aria-label="Next month">&raquo;</button>
      </div>
      <div id="calendar-grid"></div>
    </section>

    <!-- Settings View -->
    <section id="view-settings" class="view" aria-label="Settings" hidden>
      <div id="settings-rate-table"></div>
      <div id="settings-balances"></div>
      <div id="settings-misc"></div>
      <div id="settings-min-balances"></div>
      <div id="settings-bills"></div>
      <div id="settings-holidays"></div>
      <div id="settings-export-import"></div>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
